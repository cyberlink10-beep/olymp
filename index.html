<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ЖК Герои — Жилой комплекс</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <style>
    @font-face { font-family: 'Dela Gothic One'; src: url('fonts/DelaGothicOne-Regular.ttf') format('truetype'); }
    @font-face { font-family: 'Inter'; src: url('fonts/Inter-Regular.ttf') format('truetype'); }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --c-brand: #D94E1F;
      --c-brand-dark: #8B1500;
      --c-brand-mid: #C43818;
      --c-gold: #C9A84C;
      --c-dark: #1E1B18;
      --c-charcoal: #2D2A27;
      --c-gray-700: #4A4540;
      --c-gray-500: #7A746E;
      --c-gray-300: #C0B8B0;
      --c-gray-100: #EDE8E3;
      --c-surface: #F7F4F1;
      --c-white: #FFFFFF;
      --font-display: 'Dela Gothic One', Impact, sans-serif;
      --font-body: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      --max-w: 1280px;
      --r-sm: 4px;
      --r-md: 8px;
      --r-lg: 12px;
      --shadow-md: 0 2px 16px rgba(0,0,0,0.10);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.15);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--c-surface);
      color: var(--c-charcoal);
      line-height: 1.6;
    }

    .container {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 40px;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: var(--font-body);
      font-size: 14px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: none;
      border-radius: var(--r-sm);
      cursor: pointer;
      padding: 13px 28px;
      transition: all 220ms cubic-bezier(0.22,1,0.36,1);
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }

    /* Ripple */
    .btn .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      transform: scale(0);
      animation: ripple-anim 550ms ease-out forwards;
      pointer-events: none;
    }
    @keyframes ripple-anim {
      to { transform: scale(4); opacity: 0; }
    }

    .btn-primary {
      background: linear-gradient(135deg, #E05520 0%, #D94E1F 50%, #C43818 100%);
      color: #fff;
      box-shadow: 0 4px 20px rgba(217,78,31,0.40);
    }
    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 220ms;
    }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(217,78,31,0.55); }
    .btn-primary:hover::before { opacity: 1; }
    .btn-primary:active { transform: scale(0.97) translateY(0); box-shadow: 0 2px 8px rgba(217,78,31,0.3); }

    .btn-secondary {
      background: transparent;
      color: var(--c-brand);
      border: 1.5px solid var(--c-brand);
    }
    .btn-secondary:hover {
      background: var(--c-brand);
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(217,78,31,0.35);
    }
    .btn-secondary:active { transform: scale(0.97); }

    .btn-dark { background: var(--c-dark); color: #fff; }
    .btn-dark:hover { background: var(--c-charcoal); transform: translateY(-2px); }
    .btn-lg { padding: 17px 40px; font-size: 15px; }

    /* Hero-specific ghost button */
    .btn-hero-ghost {
      background: transparent;
      color: #fff;
      border: 1.5px solid rgba(255,255,255,0.45);
      backdrop-filter: blur(4px);
    }
    .btn-hero-ghost:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.8);
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }
    .btn-hero-ghost:active { transform: scale(0.97); }

    /* Header call button pulse */
    .btn-call {
      animation: pulse-glow 2.5s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 4px 20px rgba(217,78,31,0.4); }
      50% { box-shadow: 0 4px 28px rgba(217,78,31,0.75), 0 0 0 6px rgba(217,78,31,0.12); }
    }

    /* Ken Burns hero bg */
    @keyframes kenburns {
      0%   { transform: scale(1.08) translate(0, 0); }
      50%  { transform: scale(1.13) translate(-1%, -0.5%); }
      100% { transform: scale(1.08) translate(0, 0); }
    }

    /* Hero text reveal */
    @keyframes heroSlideUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hero-line { animation: heroSlideUp 0.8s cubic-bezier(0.22,1,0.36,1) both; }
    .hero-line-1 { animation-delay: 0.15s; }
    .hero-line-2 { animation-delay: 0.30s; }
    .hero-line-3 { animation-delay: 0.45s; }
    .hero-line-4 { animation-delay: 0.60s; }
    .hero-line-5 { animation-delay: 0.78s; }

    /* Floating badge */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-6px); }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--c-gray-300); border-radius: 3px; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(20,16,12,0.75);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .modal-box {
      background: #fff; border-radius: 16px;
      max-width: 720px; width: 100%;
      overflow: hidden; box-shadow: 0 32px 80px rgba(0,0,0,0.35);
      max-height: 90vh; overflow-y: auto;
    }

    /* Scroll-reveal */
    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 600ms cubic-bezier(0.22,1,0.36,1), transform 600ms cubic-bezier(0.22,1,0.36,1);
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-delay-1 { transition-delay: 100ms; }
    .reveal-delay-2 { transition-delay: 200ms; }
    .reveal-delay-3 { transition-delay: 320ms; }
    .reveal-delay-4 { transition-delay: 440ms; }
    .reveal-delay-5 { transition-delay: 560ms; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Nav link hover effect */
    .nav-link {
      position: relative;
      font-family: var(--font-body);
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      padding-bottom: 4px;
      transition: color 200ms ease;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: 0; left: 50%;
      width: 0; height: 2px;
      background: var(--c-brand);
      border-radius: 2px;
      transition: width 250ms cubic-bezier(0.22,1,0.36,1), left 250ms cubic-bezier(0.22,1,0.36,1);
    }
    .nav-link:hover::after,
    .nav-link.active::after { width: 100%; left: 0; }
    .nav-link:hover { color: #fff !important; }
    .nav-link.active { color: var(--c-brand) !important; }

    /* Logo hover */
    .logo-wrap {
      cursor: pointer;
      transition: transform 250ms cubic-bezier(0.22,1,0.36,1), opacity 200ms;
    }
    .logo-wrap:hover { transform: scale(1.04); opacity: 0.92; }
    .logo-wrap:active { transform: scale(0.98); }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

/* ─── RIPPLE HELPER ─── */
function addRipple(e) {
  const btn = e.currentTarget;
  const r = btn.getBoundingClientRect();
  const size = Math.max(r.width, r.height) * 2;
  const x = e.clientX - r.left - size / 2;
  const y = e.clientY - r.top - size / 2;
  const span = document.createElement('span');
  span.className = 'ripple';
  span.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px`;
  btn.appendChild(span);
  span.addEventListener('animationend', () => span.remove());
}

/* ─── HEADER ─── */
function Header({ activeSection, onNav }) {
  const [scrolled, setScrolled] = useState(false);

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const links = [
    { id: 'about',     label: 'О комплексе' },
    { id: 'catalog',   label: 'Квартиры' },
    { id: 'floorplan', label: 'Планировки' },
    { id: 'features',  label: 'Преимущества' },
    { id: 'progress',  label: 'Строительство' },
    { id: 'contact',   label: 'Контакты' },
  ];

  return (
    <header style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
      height: 76, display: 'flex', alignItems: 'center',
      background: scrolled ? 'rgba(20,17,14,0.96)' : 'transparent',
      backdropFilter: scrolled ? 'blur(14px)' : 'none',
      transition: 'background 350ms ease-out, backdrop-filter 350ms, box-shadow 350ms',
      boxShadow: scrolled ? '0 1px 0 rgba(255,255,255,0.07)' : 'none',
    }}>
      <div style={{
        maxWidth: 'var(--max-w)', margin: '0 auto', padding: '0 40px',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        width: '100%', gap: 24,
      }}>
        {/* Logo — original PNG as-is */}
        <div className="logo-wrap" onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
          style={{ flexShrink: 0 }}>
          <img src="assets/logo.png" alt="Герои" style={{ height: 56, width: 'auto', display: 'block' }} />
        </div>

        {/* Nav */}
        <nav style={{ display: 'flex', gap: 24, flex: 1, justifyContent: 'center' }}>
          {links.map(l => (
            <a
              key={l.id}
              className={`nav-link${activeSection === l.id ? ' active' : ''}`}
              onClick={() => onNav(l.id)}
              style={{ color: activeSection === l.id ? 'var(--c-brand)' : 'rgba(255,255,255,0.78)', whiteSpace: 'nowrap' }}
            >{l.label}</a>
          ))}
        </nav>

        {/* CTA */}
        <div style={{ flexShrink: 0 }}>
          <a className="btn btn-primary btn-call" href="tel:+78001234567"
            style={{ fontSize: 13, whiteSpace: 'nowrap' }}
            onMouseDown={addRipple}>
            Позвонить
          </a>
        </div>
      </div>
    </header>
  );
}

/* ─── HERO SLIDER ─── */
const SLIDES = [
  { src: 'assets/render-hero-1.png', caption: 'Фасад со стороны улицы' },
  { src: 'assets/render-hero-2.png', caption: 'Внутренний двор' },
  { src: 'assets/render-hero-3.png', caption: 'Коммерческий первый этаж' },
];

function Hero({ onNav }) {
  const [current, setCurrent] = useState(0);
  const [prev, setPrev] = useState(null);
  const [fading, setFading] = useState(false);
  const timerRef = useRef(null);

  const goTo = useCallback((next) => {
    if (fading) return;
    setPrev(current);
    setFading(true);
    setTimeout(() => {
      setCurrent(next);
      setPrev(null);
      setFading(false);
    }, 700);
  }, [current, fading]);

  const goPrev = useCallback(() => {
    goTo((current - 1 + SLIDES.length) % SLIDES.length);
  }, [current, goTo]);

  const goNext = useCallback(() => {
    goTo((current + 1) % SLIDES.length);
  }, [current, goTo]);

  // Auto-advance
  useEffect(() => {
    timerRef.current = setInterval(goNext, 7000);
    return () => clearInterval(timerRef.current);
  }, [goNext]);

  const resetTimer = () => {
    clearInterval(timerRef.current);
    timerRef.current = setInterval(goNext, 7000);
  };

  const handlePrev = () => { goPrev(); resetTimer(); };
  const handleNext = () => { goNext(); resetTimer(); };

  const arrowBtn = (onClick, dir) => (
    <button onClick={onClick} style={{
      position: 'absolute', top: '50%',
      [dir === 'left' ? 'left' : 'right']: 36,
      transform: 'translateY(-50%)',
      zIndex: 10, cursor: 'pointer', border: 'none',
      width: 56, height: 56, borderRadius: '50%',
      background: 'rgba(255,255,255,0.12)',
      backdropFilter: 'blur(10px)',
      WebkitBackdropFilter: 'blur(10px)',
      boxShadow: '0 4px 24px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.2)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      transition: 'background 200ms, transform 200ms, box-shadow 200ms',
    }}
      onMouseEnter={e => {
        e.currentTarget.style.background = 'rgba(217,78,31,0.75)';
        e.currentTarget.style.transform = `translateY(-50%) scale(1.08)`;
        e.currentTarget.style.boxShadow = '0 8px 32px rgba(217,78,31,0.45), inset 0 1px 0 rgba(255,255,255,0.2)';
      }}
      onMouseLeave={e => {
        e.currentTarget.style.background = 'rgba(255,255,255,0.12)';
        e.currentTarget.style.transform = 'translateY(-50%) scale(1)';
        e.currentTarget.style.boxShadow = '0 4px 24px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.2)';
      }}
      onMouseDown={e => { e.currentTarget.style.transform = 'translateY(-50%) scale(0.95)'; }}
      onMouseUp={e => { e.currentTarget.style.transform = 'translateY(-50%) scale(1.08)'; }}
    >
      {dir === 'left'
        ? <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <path d="M14 5l-6 6 6 6" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        : <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <path d="M8 5l6 6-6 6" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
      }
    </button>
  );

  return (
    <section id="hero" style={{
      position: 'relative', height: '100vh', minHeight: 640,
      display: 'flex', alignItems: 'flex-end',
      overflow: 'hidden',
    }}>
      {/* Slide stack — using <img> for full native quality, no CSS resampling */}
      {SLIDES.map((slide, i) => {
        const isActive = i === current;
        const isPrev = i === prev;
        return (
          <div key={slide.src} style={{
            position: 'absolute', inset: 0,
            opacity: isActive ? 1 : isPrev && fading ? 0 : 0,
            transition: isActive
              ? 'opacity 700ms ease-in-out'
              : isPrev && fading ? 'opacity 700ms ease-in-out' : 'none',
            zIndex: isActive ? 2 : isPrev ? 1 : 0,
          }}>
            <img
              src={slide.src}
              alt={slide.caption}
              style={{
                position: 'absolute', inset: 0,
                width: '100%', height: '100%',
                objectFit: 'cover', objectPosition: 'center',
                imageRendering: 'auto',
                display: 'block',
              }}
              decoding="async"
              fetchpriority={i === 0 ? 'high' : 'low'}
            />
          </div>
        );
      })}

      {/* Gradient overlay */}
      <div style={{
        position: 'absolute', inset: 0, zIndex: 3,
        background: 'linear-gradient(to top, rgba(16,12,8,0.78) 0%, rgba(16,12,8,0.30) 52%, rgba(16,12,8,0.05) 100%)',
      }} />

      {/* Accent line */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 4, height: 3,
        background: 'linear-gradient(90deg, transparent, var(--c-brand) 30%, var(--c-gold) 70%, transparent)',
        opacity: 0.8,
      }} />

      {/* Left / Right arrows */}
      <div style={{ position: 'absolute', inset: 0, zIndex: 5 }}>
        {arrowBtn(handlePrev, 'left')}
        {arrowBtn(handleNext, 'right')}
      </div>

      {/* Dots + caption */}
      <div style={{
        position: 'absolute', bottom: 28, right: 40, zIndex: 5,
        display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 10,
      }}>
        <span style={{
          fontSize: 12, color: 'rgba(255,255,255,0.55)',
          letterSpacing: '0.1em', textTransform: 'uppercase',
          fontFamily: 'var(--font-body)',
        }}>{SLIDES[current].caption}</span>
        <div style={{ display: 'flex', gap: 7, alignItems: 'center' }}>
          {SLIDES.map((_, i) => (
            <button key={i} onClick={() => { goTo(i); resetTimer(); }} style={{
              width: i === current ? 28 : 8, height: 8, borderRadius: 4,
              background: i === current ? 'var(--c-brand)' : 'rgba(255,255,255,0.38)',
              border: 'none', cursor: 'pointer', padding: 0,
              transition: 'width 350ms cubic-bezier(0.22,1,0.36,1), background 300ms',
            }} />
          ))}
        </div>
      </div>

      {/* Slide counter */}
      <div style={{
        position: 'absolute', top: 96, right: 40, zIndex: 5,
        fontFamily: 'var(--font-display)', fontSize: 13,
        color: 'rgba(255,255,255,0.35)', letterSpacing: '0.1em',
      }}>
        {String(current + 1).padStart(2, '0')} / {String(SLIDES.length).padStart(2, '0')}
      </div>

      {/* Content */}
      <div className="container" style={{ position: 'relative', zIndex: 5, paddingBottom: 80, width: '100%' }}>
        <div style={{ maxWidth: 680 }}>

          <div className="hero-line hero-line-1" style={{ marginBottom: 22, display: 'flex', alignItems: 'center', gap: 12 }}>
            <span style={{
              display: 'inline-flex', alignItems: 'center', gap: 7,
              background: 'rgba(201,168,76,0.18)',
              border: '1px solid rgba(201,168,76,0.55)',
              borderRadius: 4, padding: '5px 14px 5px 10px',
              backdropFilter: 'blur(6px)',
            }}>
              <svg width="12" height="15" viewBox="0 0 12 15" fill="none">
                <path d="M6 0C2.686 0 0 2.686 0 6c0 4.418 6 9 6 9s6-4.582 6-9c0-3.314-2.686-6-6-6z" fill="#C9A84C"/>
                <circle cx="6" cy="6" r="2" fill="white"/>
              </svg>
              <span style={{
                fontFamily: 'var(--font-body)', fontSize: 12, letterSpacing: '0.18em',
                textTransform: 'uppercase', color: '#E8CA72', fontWeight: 500,
              }}>Жилой комплекс · Курган</span>
            </span>
          </div>

          <h1 className="hero-line hero-line-2" style={{
            fontFamily: 'var(--font-display)', fontSize: 'clamp(52px, 7.5vw, 100px)',
            lineHeight: 0.95, letterSpacing: '-0.02em', color: '#fff',
            textTransform: 'uppercase', marginBottom: 12,
          }}>ГЕРОИ</h1>

          <p className="hero-line hero-line-3" style={{
            fontFamily: 'var(--font-display)', fontSize: 'clamp(16px, 2vw, 24px)',
            color: 'rgba(255,255,255,0.68)', textTransform: 'uppercase',
            letterSpacing: '0.05em', marginBottom: 20,
          }}>Жилой комплекс для настоящих героев</p>

          <p className="hero-line hero-line-3" style={{
            fontSize: 15, color: 'rgba(255,255,255,0.58)', marginBottom: 36,
            lineHeight: 1.7, maxWidth: 440,
          }}>
            Современные квартиры с продуманной планировкой. Закрытый двор, собственный спорткомплекс, коммерческие помещения.
          </p>

          <div className="hero-line hero-line-4" style={{ display: 'flex', gap: 12, flexWrap: 'wrap' }}>
            <button className="btn btn-primary btn-lg" onMouseDown={addRipple} onClick={() => onNav('catalog')}>
              Выбрать квартиру
            </button>
            <button className="btn btn-hero-ghost btn-lg" onMouseDown={addRipple} onClick={() => onNav('contact')}>
              Узнать цену
            </button>
          </div>

          <div className="hero-line hero-line-5" style={{ display: 'flex', marginTop: 48 }}>
            {[['от 2,9 млн ₽', 'Стоимость'], ['1–3', 'Комнат'], ['34–86 м²', 'Площади'], ['2027', 'Год сдачи']].map(([v, l], i) => (
              <div key={l} style={{
                paddingRight: 28, paddingLeft: i === 0 ? 0 : 28,
                borderLeft: i === 0 ? 'none' : '1px solid rgba(255,255,255,0.14)',
              }}>
                <div style={{ fontFamily: 'var(--font-display)', fontSize: 20, color: '#fff', lineHeight: 1.2 }}>{v}</div>
                <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.42)', letterSpacing: '0.1em', textTransform: 'uppercase', marginTop: 3 }}>{l}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </section>
  );
}

/* ─── ABOUT STRIP ─── */
function AboutStrip() {
  return (
    <section id="about" style={{ background: 'var(--c-brand)', padding: '48px 0' }}>
      <div className="container" style={{ display: 'flex', gap: 64, justifyContent: 'center', flexWrap: 'wrap' }}>
        {[['12', 'этажей'], ['4', 'корпуса'], ['320', 'квартир'], ['2027', 'год сдачи'], ['34–86', 'м² площадь']].map(([v, l], i) => (
          <div key={l} className={`reveal reveal-delay-${i + 1}`} style={{ textAlign: 'center' }}>
            <div style={{ fontFamily: 'var(--font-display)', fontSize: 40, color: '#fff', lineHeight: 1 }}>{v}</div>
            <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.65)', letterSpacing: '0.1em', textTransform: 'uppercase', marginTop: 4 }}>{l}</div>
          </div>
        ))}
      </div>
    </section>
  );
}

/* ─── APARTMENT CARD ─── */
function ApartmentCard({ apt, onSelect }) {
  return (
    <div onClick={() => onSelect(apt)} style={{
      background: '#fff', borderRadius: 10, overflow: 'hidden',

      if (sortBy === 'price-asc') return a.price - b.price;
      if (sortBy === 'price-desc') return b.price - a.price;
      if (sortBy === 'area-asc') return a.area - b.area;
      if (sortBy === 'area-desc') return b.area - a.area;
      return 0;

  const inputStyle = {
    fontFamily: 'var(--font-body)', fontSize: 13, padding: '7px 12px',

    background: '#fff', color: 'var(--c-charcoal)', outline: 'none', width: 96,

  return (
    <section id="catalog" style={{ padding: '96px 0', background: 'var(--c-surface)' }}>
      <div className="container">
        <div style={{ marginBottom: 48 }}>

        {/* Filter bar */}

          marginBottom: 32, display: 'flex', gap: 24, flexWrap: 'wrap', alignItems: 'center',
          boxShadow: '0 2px 12px rgba(0,0,0,0.06)',
        }}>
          {/* Rooms */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <span style={{ fontSize: 12, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--c-gray-500)' }}>Комнат:</span>
            {[null, 1, 2, 3].map(r => (
              <button key={r} onClick={() => setRoomsFilter(r)} style={{
                padding: '6px 14px', borderRadius: 9999, fontSize: 13, cursor: 'pointer',
                border: '1.5px solid', transition: 'all 150ms',

                borderColor: roomsFilter === r ? 'var(--c-brand)' : 'var(--c-gray-100)',

          </div>

          {/* Price range */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <span style={{ fontSize: 12, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--c-gray-500)' }}>Цена (млн ₽):</span>
            <input style={inputStyle} type="number" placeholder="от" value={minPrice} onChange={e => setMinPrice(e.target.value)} />
            <span style={{ color: 'var(--c-gray-300)', fontSize: 13 }}>—</span>

          {/* Sort */}
          <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 8 }}>

              <option value="price-desc">Цена ↓</option>
              <option value="area-asc">Площадь ↑</option>

            </select>
          </div>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(240px, 1fr))', gap: 20 }}>
          {filtered.map(apt => <ApartmentCard key={apt.id} apt={apt} onSelect={onSelectApt} />)}
        </div>

        {filtered.length === 0 && (
          <div style={{ textAlign: 'center', padding: '64px 0', color: 'var(--c-gray-500)' }}>
            <div style={{ fontSize: 32, marginBottom: 12 }}>—</div>

          </div>

    </section>

/* ─── FLOOR PLAN ─── */
function genFloor(floor, korpus) {
  const seed = floor * 7 + korpus * 13;
  const layouts = [
    { rooms: 1, area: 36, side: 'left' },
    { rooms: 1, area: 42, side: 'left' },
    { rooms: 2, area: 58, side: 'center' },
    { rooms: 2, area: 64, side: 'center' },
    { rooms: 3, area: 78, side: 'right' },
    { rooms: 3, area: 86, side: 'right' },
    { rooms: 1, area: 34, side: 'right' },
  ];
  return layouts.map((l, i) => ({
    ...l,
    id: `${korpus}-${floor}-${i}`,
    floor,
    korpus,
    available: (seed + i * 3) % 5 !== 0,
    price: Math.round((l.area * 78000 + floor * 12000) / 10000) * 10000,
    apt: `${(floor - 1) * 7 + i + 1}`,
  }));
}

function AptShape({ apt, isHovered, isSelected, onClick, onHover }) {
  const W = apt.rooms === 1 ? 70 : apt.rooms === 2 ? 100 : 130;
  const H = apt.area < 50 ? 80 : apt.area < 70 ? 96 : 110;
  const fill = isSelected ? '#D94E1F' : isHovered ? '#F0784A' : apt.available ? '#fff' : '#EDE8E3';
  const stroke = isSelected ? '#D94E1F' : '#C0B8B0';
  const textCol = isSelected ? '#fff' : apt.available ? '#2D2A27' : '#C0B8B0';

  return (
    <g
      style={{ cursor: apt.available ? 'pointer' : 'default' }}
      onClick={() => apt.available && onClick(apt)}
      onMouseEnter={() => apt.available && onHover(apt.id)}
      onMouseLeave={() => onHover(null)}
    >
      <rect x="0" y="0" width={W} height={H} rx="6" fill={fill} stroke={stroke} strokeWidth="1.5" style={{ transition: 'fill 150ms' }} />
      <text x={W/2} y={H/2 - 8} textAnchor="middle" fontFamily="'Dela Gothic One', sans-serif" fontSize="14" fill={textCol}>{apt.rooms}-к</text>
      <text x={W/2} y={H/2 + 8} textAnchor="middle" fontFamily="'Inter', sans-serif" fontSize="10" fill={isSelected ? 'rgba(255,255,255,0.8)' : '#7A746E'}>{apt.area} м²</text>
      <text x={W/2} y={H/2 + 22} textAnchor="middle" fontFamily="'Inter', sans-serif" fontSize="9" fill={isSelected ? 'rgba(255,255,255,0.7)' : '#C0B8B0'}>кв. {apt.apt}</text>
      {!apt.available && (
        <text x={W/2} y={H - 12} textAnchor="middle" fontFamily="'Inter', sans-serif" fontSize="9" fill="#C0B8B0">бронь</text>
      )}
    </g>
  );
}

function FloorMap({ apartments, hoveredId, selectedApt, onSelect, onHover }) {
  let xOffset = 20;
  const positions = apartments.map(apt => {
    const W = apt.rooms === 1 ? 70 : apt.rooms === 2 ? 100 : 130;
    const pos = { ...apt, x: xOffset };
    xOffset += W + 8;
    return pos;
  });
  const totalW = Math.max(xOffset + 20, 200);

  return (
    <svg width="100%" viewBox={`0 0 ${totalW} 160`} style={{ overflow: 'visible' }}>
      <rect x="10" y="20" width={totalW - 20} height={120} rx="8" fill="#F7F4F1" stroke="#EDE8E3" strokeWidth="1.5" />
      <rect x="10" y="128" width={totalW - 20} height="12" rx="0" fill="#EDE8E3" />
      <text x={totalW/2} y="137" textAnchor="middle" fontFamily="'Inter', sans-serif" fontSize="9" fill="#C0B8B0" letterSpacing="2">КОРИДОР</text>
      <rect x={totalW/2 - 16} y="24" width="32" height="100" rx="4" fill="#EDE8E3" stroke="#C0B8B0" strokeWidth="1" />
      <text x={totalW/2} y="78" textAnchor="middle" fontFamily="'Inter', sans-serif" fontSize="8" fill="#C0B8B0">ЛИФТ</text>
      {positions.map(apt => (
        <g key={apt.id} transform={`translate(${apt.x}, 28)`}>
          <AptShape apt={apt} isHovered={hoveredId === apt.id} isSelected={selectedApt?.id === apt.id} onClick={onSelect} onHover={onHover} />
        </g>
      ))}
    </svg>
  );
}

  const handleFloor = (f) => { setFloor(f); setSelectedApt(null); setAnimKey(k => k + 1); };
  const handleKorpus = (k) => { setKorpus(k); setSelectedApt(null); setAnimKey(k => k + 1); };

  const allApts = genFloor(floor, korpus);
  const filtered = allApts.filter(a => {
    if (filterRooms && a.rooms !== filterRooms) return false;

    if (filterAvail === 'booked' && a.available) return false;
    return true;

          <button onClick={onClose} style={{
            position: 'absolute', top: 16, right: 16,
            width: 36, height: 36, borderRadius: '50%',
            background: 'rgba(0,0,0,0.5)', border: 'none',
            color: '#fff', fontSize: 20, cursor: 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>×</button>
          {apt.badge && (
            <span style={{
              position: 'absolute', top: 16, left: 16,
              background: 'var(--c-brand)', color: '#fff',
              fontSize: 11, padding: '4px 10px', borderRadius: 4,
              letterSpacing: '0.06em', textTransform: 'uppercase',
            }}>{apt.badge}</span>
          )}
        </div>
        <div style={{ padding: '28px 32px 32px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 20 }}>
            <div>
              <h3 style={{ fontFamily: 'var(--font-display)', fontSize: 28, textTransform: 'uppercase', color: 'var(--c-charcoal)', marginBottom: 4 }}>
                {apt.rooms}-комнатная квартира
              </h3>
              <div style={{ fontSize: 14, color: 'var(--c-gray-500)' }}>
                Секция {apt.section} · {apt.floor} этаж · {apt.area} м²
              </div>
            </div>
            <div style={{ textAlign: 'right' }}>
              <div style={{ fontFamily: 'var(--font-display)', fontSize: 26, color: 'var(--c-brand)' }}>
                {apt.price.toLocaleString('ru-RU')} ₽
              </div>
              <div style={{ fontSize: 12, color: 'var(--c-gray-300)', marginTop: 2 }}>
                {Math.round(apt.price / apt.area).toLocaleString('ru-RU')} ₽/м²
              </div>
            </div>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 24 }}>
            {[['Площадь', `${apt.area} м²`], ['Этаж', `${apt.floor} из 12`], ['Секция', apt.section], ['Статус', apt.available ? 'Свободна' : 'Бронь']].map(([l, v]) => (
              <div key={l} style={{ background: 'var(--c-surface)', padding: '12px 16px', borderRadius: 8 }}>
                <div style={{ fontSize: 11, color: 'var(--c-gray-300)', letterSpacing: '0.06em', textTransform: 'uppercase', marginBottom: 4 }}>{l}</div>
                <div style={{ fontSize: 15, color: 'var(--c-charcoal)', fontWeight: 600 }}>{v}</div>
              </div>
            ))}
          </div>

          <div style={{
            background: 'var(--c-surface)', borderRadius: 8, border: '1px solid var(--c-gray-100)',
            height: 200, display: 'flex', alignItems: 'center', justifyContent: 'center',
            flexDirection: 'column', gap: 8, marginBottom: 24,
          }}>
            <svg width="80" height="70" viewBox="0 0 80 70" fill="none">
              <rect x="2" y="2" width="76" height="66" rx="4" stroke="#C0B8B0" strokeWidth="1.5" fill="#F7F4F1"/>
              {apt.rooms === 1 && <rect x="8" y="8" width="64" height="54" rx="2" stroke="#C0B8B0" strokeWidth="1" fill="none"/>}
              {apt.rooms === 2 && <>
                <rect x="8" y="8" width="36" height="54" rx="2" stroke="#C0B8B0" strokeWidth="1" fill="none"/>
                <rect x="48" y="8" width="24" height="54" rx="2" stroke="#C0B8B0" strokeWidth="1" fill="none"/>
              </>}
              {apt.rooms === 3 && <>
                <rect x="4" y="8" width="24" height="54" rx="2" stroke="#C0B8B0" strokeWidth="1" fill="none"/>
                <rect x="32" y="8" width="20" height="25" rx="2" stroke="#C0B8B0" strokeWidth="1" fill="none"/>
                <rect x="32" y="37" width="20" height="25" rx="2" stroke="#C0B8B0" strokeWidth="1" fill="none"/>
                <rect x="56" y="8" width="20" height="54" rx="2" stroke="#C0B8B0" strokeWidth="1" fill="none"/>
              </>}
            </svg>
            <span style={{ color: 'var(--c-gray-300)', fontFamily: 'var(--font-body)', fontSize: 13 }}>Планировка квартиры</span>
            <span style={{ fontSize: 11, color: 'var(--c-gray-100)' }}>Доступна по запросу</span>
          </div>

          <div style={{ display: 'flex', gap: 12 }}>
            <button className="btn btn-primary btn-lg" style={{ flex: 1 }}>Забронировать</button>
            <button className="btn btn-secondary" style={{ flex: 1 }}>Узнать цену</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── SCROLL REVEAL ─── */
function useReveal() {
  useEffect(() => {
    const observe = () => {
      const els = document.querySelectorAll('.reveal');
      const io = new IntersectionObserver(entries => {
        entries.forEach(e => {
          if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); }
        });
      }, { threshold: 0.12 });
      els.forEach(el => io.observe(el));
      return () => io.disconnect();
    };
    const cleanup = observe();
    return cleanup;
  }, []);
}

/* ─── APP ─── */
function App() {
  const [activeSection, setActiveSection] = useState('hero');
  const [selectedApt, setSelectedApt] = useState(null);
  useReveal();

  const handleNav = useCallback((sectionId) => {
    setActiveSection(sectionId);
    const el = document.getElementById(sectionId);
    if (el) {
      const top = el.getBoundingClientRect().top + window.scrollY - 72;
      window.scrollTo({ top, behavior: 'smooth' });
    }
  }, []);

  useEffect(() => {
    const sections = ['hero', 'about', 'catalog', 'floorplan', 'features', 'progress', 'contact'];
    const observer = new IntersectionObserver(
      entries => { entries.forEach(entry => { if (entry.isIntersecting) setActiveSection(entry.target.id); }); },
      { rootMargin: '-40% 0px -40% 0px' }
    );
    sections.forEach(id => { const el = document.getElementById(id); if (el) observer.observe(el); });
    return () => observer.disconnect();
  }, []);

  return (
    <div>
      <Header activeSection={activeSection} onNav={handleNav} />
      <Hero onNav={handleNav} />
      <div className="reveal"><AboutStrip /></div>
      <div className="reveal"><ApartmentCatalog onSelectApt={setSelectedApt} /></div>
      <div className="reveal"><FloorPlan onSelectApt={setSelectedApt} /></div>
      <div className="reveal"><Features /></div>
      <div className="reveal"><Gallery /></div>
      <div className="reveal"><ContactForm /></div>
      <Footer />
      {selectedApt && <ApartmentModal apt={selectedApt} onClose={() => setSelectedApt(null)} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
